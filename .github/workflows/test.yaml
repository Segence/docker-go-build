name: test
on:
  push:
    branches:
    - main
    - dev
  pull_request:
jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        classifier: [kafka]
    permissions:
      security-events: write   # ← THIS is what you're missing
      contents: read           # needed to check out code
      actions: read            # needed by some codeql internals
      pull-requests: write
    steps:
    - uses: actions/checkout@v3
    - name: Lint Dockerfile
      id: hadolint
      uses: hadolint/hadolint-action@v3.3.0
      with:
        dockerfile: ./${{ matrix.classifier }}/Dockerfile
    - name: Build an image from Dockerfile
      run: docker build --tag ${{ matrix.classifier }}:latest ./${{ matrix.classifier }}
    # - name: Run Trivy vulnerability scanner
    #   uses: aquasecurity/trivy-action@v0.36.0
    #   with:
    #     image-ref: '${{ matrix.classifier }}:latest'
    #     format: 'table'
    #     exit-code: '1'
    #     ignore-unfixed: true
    #     vuln-type: 'os,library'
    #     severity: 'CRITICAL,HIGH'
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: '${{ matrix.classifier }}:latest'
        format: 'sarif'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'
        output: 'trivy-results.sarif'
    # - name: Echo Trivy SARIF results
    #   run: cat trivy-results.sarif
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: 'trivy-results.sarif'
    - name: Update Pull Request
      uses: actions/github-script@v9
      if: github.event_name == 'pull_request'
      with:
        script: |
          const output = `
          #### Hadolint: \`${{ steps.hadolint.outcome }}\`
          \`\`\`
          ${process.env.HADOLINT_RESULTS}
          \`\`\`
          `;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          })
